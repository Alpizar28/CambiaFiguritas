    <style>
      html, body { height: 100%; }
      body {
        background-color: #0A0A0A;
        margin: 0;
        padding: 0;
        overflow: hidden;
        -webkit-text-size-adjust: 100%;
      }
      #root {
        display: flex;
        flex: 1;
        height: 100%;
        background-color: #0A0A0A;
      }
      #pre-splash {
        position: fixed;
        inset: 0;
        background: #0A0A0A;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        z-index: 99999;
        font-family: system-ui, -apple-system, sans-serif;
        color: #FFD700;
        transition: opacity 200ms ease;
      }
      #pre-splash.hidden { opacity: 0; pointer-events: none; }
      .pre-splash-logo {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 2px;
      }
      .pre-splash-sub {
        font-size: 14px;
        color: #888;
        font-weight: 500;
      }
      .pre-splash-spin {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 3px solid rgba(255,215,0,0.15);
        border-top-color: #FFD700;
        animation: pre-spin 0.8s linear infinite;
      }
      @keyframes pre-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="pre-splash">
      <div class="pre-splash-logo">CAMBIAFIGURITAS</div>
      <div class="pre-splash-spin"></div>
      <div class="pre-splash-sub">Mundial 2026</div>
    </div>
    <script>
      (function () {
        var root = document.getElementById('root');
        var splash = document.getElementById('pre-splash');
        if (!root || !splash) return;
        var hide = function () {
          splash.classList.add('hidden');
          setTimeout(function () { splash.remove(); }, 250);
        };
        var observer = new MutationObserver(function () {
          if (root.childNodes.length > 0) {
            observer.disconnect();
            hide();
          }
        });
        observer.observe(root, { childList: true });
        // Safety net: ocultar a los 8s sí o sí
        setTimeout(function () { observer.disconnect(); hide(); }, 8000);
      })();
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        });
      }
    </script>
  </body>
