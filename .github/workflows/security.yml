name: security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 11 * * 1'

permissions:
  contents: read

jobs:
  dep-audit-app:
    name: npm audit (app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --prefix app
      - run: npm audit --prefix app --audit-level=high

  dep-audit-functions:
    name: npm audit (functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci --prefix functions
      - run: npm audit --prefix functions --audit-level=high

  typecheck-app:
    name: tsc (app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --prefix app
      - run: npm run typecheck --prefix app

  build-functions:
    name: tsc build (functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci --prefix functions
      - run: npm run build --prefix functions

  firestore-rules:
    name: firestore rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: firestore-tests/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm i -g firebase-tools@latest
      - run: npm ci --prefix firestore-tests
      - run: npm test --prefix firestore-tests

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prod-headers:
    name: prod security headers
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    env:
      URL: https://cambiafiguritas.web.app/
    steps:
      - uses: actions/checkout@v4
      - run: bash .github/scripts/check-prod-headers.sh
